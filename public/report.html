<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Performance Report — Polymarket Bot</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/hammerjs@2.0.8/hammer.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-zoom@2.0.1/dist/chartjs-plugin-zoom.min.js"></script>
<style>
:root{
  --bg:#07090f;--surface:#0d1018;--card:#101520;--card2:#131822;
  --border:#1a2236;--border2:#212d46;--text:#e0e8f4;
  --muted:#4e5f7e;--muted2:#8090b0;
  --green:#1fd475;--green2:#0b5c32;
  --red:#ff3f5e;--red2:#6b1523;
  --yellow:#f5c030;--blue:#3f80ff;--blue2:#1a3060;
  --purple:#a87fff;--cyan:#00cfc8;--orange:#ff7c30;
}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;font-size:13px;line-height:1.5;min-height:100vh}
.mono{font-family:'JetBrains Mono',monospace}

/* ── HEADER ── */
header{background:var(--surface);border-bottom:1px solid var(--border);padding:0 20px;display:flex;align-items:center;gap:12px;height:50px;position:sticky;top:0;z-index:100}
.logo{display:flex;align-items:center;gap:9px}
.logo-icon{width:28px;height:28px;border-radius:7px;background:linear-gradient(135deg,#3f80ff,#a87fff);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:800;color:#fff}
.logo-text{font-size:14px;font-weight:700;letter-spacing:.3px}
.logo-sub{font-size:10px;color:var(--muted);letter-spacing:1px;text-transform:uppercase}
.nav-links{display:flex;align-items:center;gap:4px;margin-left:12px}
.nav-link{font-size:11px;font-weight:600;color:var(--muted2);text-decoration:none;padding:5px 12px;border-radius:6px;border:1px solid transparent;letter-spacing:.3px;transition:all .15s;display:flex;align-items:center;gap:5px}
.nav-link:hover{color:var(--text);background:rgba(255,255,255,.04);border-color:var(--border)}
.nav-link.active{color:var(--blue);background:rgba(63,128,255,.08);border-color:rgba(63,128,255,.25)}
.ml-auto{margin-left:auto}
.hdr-wallet{font-size:11px;color:var(--muted);font-family:'JetBrains Mono',monospace;background:var(--card);border:1px solid var(--border);border-radius:5px;padding:3px 8px}

/* ── PAGE SUBHEADER ── */
.page-hdr{padding:20px 20px 0;display:flex;align-items:flex-end;justify-content:space-between;flex-wrap:wrap;gap:12px}
.page-title{font-size:20px;font-weight:700;letter-spacing:-.3px}
.page-subtitle{font-size:12px;color:var(--muted2);margin-top:2px}

/* ── DATE RANGE SELECTOR ── */
.range-tabs{display:flex;gap:4px;align-items:center}
.rtab{font-size:11px;font-weight:600;padding:6px 14px;border-radius:6px;border:1px solid var(--border);color:var(--muted2);cursor:pointer;background:var(--card);letter-spacing:.3px;transition:all .15s}
.rtab:hover{color:var(--text);border-color:var(--border2)}
.rtab.active{color:var(--blue);background:rgba(63,128,255,.1);border-color:rgba(63,128,255,.35)}

/* ── MAIN CONTENT ── */
.main{padding:16px 20px;display:flex;flex-direction:column;gap:14px}

/* ── KPI CARDS ── */
.kpi-row{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
.kcard{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:16px 18px;position:relative;overflow:hidden}
.kcard::before{content:'';position:absolute;top:0;left:0;right:0;height:2px}
.kcard.g::before{background:linear-gradient(90deg,var(--green),transparent)}
.kcard.b::before{background:linear-gradient(90deg,var(--blue),transparent)}
.kcard.p::before{background:linear-gradient(90deg,var(--purple),transparent)}
.kcard.y::before{background:linear-gradient(90deg,var(--yellow),transparent)}
.kcard.c::before{background:linear-gradient(90deg,var(--cyan),transparent)}
.kcard.r::before{background:linear-gradient(90deg,var(--red),transparent)}
.kcard.o::before{background:linear-gradient(90deg,var(--orange),transparent)}
.klbl{font-size:10px;font-weight:500;text-transform:uppercase;letter-spacing:.8px;color:var(--muted);margin-bottom:5px}
.kval{font-size:22px;font-weight:700;line-height:1.1;letter-spacing:-.5px}
.ksub{font-size:11px;color:var(--muted2);margin-top:4px}
.pos{color:var(--green)}.neg{color:var(--red)}.neu{color:var(--yellow)}.dim{color:var(--muted2)}

/* ── CHART PANELS ── */
.cpanel{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:16px 20px}
.cpanel-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.cpanel-title{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.7px;color:var(--muted2)}
.cpanel-actions{display:flex;gap:6px}
.chart-btn{font-size:10px;padding:3px 9px;border-radius:4px;border:1px solid var(--border);color:var(--muted2);background:var(--card2);cursor:pointer;letter-spacing:.3px;transition:all .15s}
.chart-btn:hover{color:var(--text);border-color:var(--border2)}
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:14px}
canvas{display:block}

/* ── TABLE ── */
.tpanel{background:var(--card);border:1px solid var(--border);border-radius:10px;overflow:hidden}
.tpanel-hdr{padding:12px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.tpanel-title{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.7px;color:var(--muted2)}
.scroll-box{overflow-x:auto;overflow-y:auto}
.scroll-box::-webkit-scrollbar{width:3px;height:3px}
.scroll-box::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}
table{width:100%;border-collapse:collapse}
th{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.6px;color:var(--muted);padding:9px 14px;text-align:left;border-bottom:1px solid var(--border);background:rgba(255,255,255,.01);white-space:nowrap;cursor:pointer;user-select:none}
th:hover{color:var(--muted2)}
th.sorted{color:var(--blue)}
td{padding:8px 14px;border-bottom:1px solid rgba(255,255,255,.025);font-size:12px;vertical-align:middle;white-space:nowrap}
tr:last-child td{border-bottom:none}
tr:hover td{background:rgba(255,255,255,.02)}
.erow td{color:var(--muted);text-align:center;padding:32px 14px;font-size:13px}

/* ── BADGES ── */
.badge{display:inline-flex;align-items:center;font-size:10px;font-weight:700;padding:2px 8px;border-radius:4px;text-transform:uppercase;letter-spacing:.4px}
.badge-win{background:rgba(31,212,117,.12);color:var(--green);border:1px solid rgba(31,212,117,.3)}
.badge-loss{background:rgba(255,63,94,.12);color:var(--red);border:1px solid rgba(255,63,94,.3)}
.badge-open{background:rgba(245,192,48,.12);color:var(--yellow);border:1px solid rgba(245,192,48,.3)}
.b-up{background:rgba(31,212,117,.1);color:var(--green);border:1px solid rgba(31,212,117,.2);padding:1px 7px;border-radius:4px;font-size:10px;font-weight:600}
.b-dn{background:rgba(255,63,94,.1);color:var(--red);border:1px solid rgba(255,63,94,.2);padding:1px 7px;border-radius:4px;font-size:10px;font-weight:600}

/* ── LOADING / ERROR ── */
.loading{display:flex;align-items:center;justify-content:center;gap:10px;padding:40px;color:var(--muted2);font-size:13px}
.spinner{width:16px;height:16px;border:2px solid var(--border2);border-top-color:var(--blue);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.error-msg{padding:20px;color:var(--red);font-size:13px;text-align:center}

/* ── SORT ARROW ── */
th .arrow{margin-left:4px;opacity:.4}
th.sorted .arrow{opacity:1;color:var(--blue)}

/* ── ZOOM HINT ── */
.zoom-hint{font-size:10px;color:var(--muted);margin-left:8px}

/* ── FILTER BAR ── */
.filter-bar{padding:10px 16px;border-bottom:1px solid var(--border);display:flex;flex-wrap:wrap;gap:10px;align-items:center}
.filter-group{display:flex;align-items:center;gap:4px;flex-wrap:wrap}
.filter-label{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.6px;color:var(--muted);margin-right:2px;white-space:nowrap}
.fchip{font-size:10px;font-weight:600;padding:3px 9px;border-radius:4px;border:1px solid var(--border);color:var(--muted2);background:var(--card2);cursor:pointer;letter-spacing:.3px;transition:all .12s;white-space:nowrap}
.fchip:hover{color:var(--text);border-color:var(--border2)}
.fchip.active{background:rgba(63,128,255,.12);color:var(--blue);border-color:rgba(63,128,255,.4)}
.fchip.win.active{background:rgba(31,212,117,.1);color:var(--green);border-color:rgba(31,212,117,.35)}
.fchip.loss.active{background:rgba(255,63,94,.1);color:var(--red);border-color:rgba(255,63,94,.35)}
.fchip.open.active{background:rgba(245,192,48,.1);color:var(--yellow);border-color:rgba(245,192,48,.35)}
.filter-sep{width:1px;height:16px;background:var(--border);margin:0 4px}
</style>
</head>
<body>

<!-- HEADER -->
<header>
  <div class="logo">
    <div class="logo-icon">P</div>
    <div>
      <div class="logo-text">Polymarket Bot</div>
      <div class="logo-sub">Oracle Lag Arb</div>
    </div>
  </div>
  <div class="nav-links">
    <a href="/" class="nav-link">⚡ Dashboard</a>
    <a href="/report.html" class="nav-link active">📊 Reports</a>
  </div>
  <div class="ml-auto" style="display:flex;align-items:center;gap:10px">
    <span class="hdr-wallet mono" id="hdr-wallet">Loading…</span>
    <span id="hdr-updated" style="font-size:10px;color:var(--muted)"></span>
  </div>
</header>

<!-- PAGE SUBHEADER -->
<div class="page-hdr">
  <div>
    <div class="page-title">Performance Report</div>
    <div class="page-subtitle" id="page-subtitle">Fetching data from Polymarket API…</div>
  </div>
  <div style="display:flex;align-items:center;gap:8px">
    <div class="range-tabs">
      <button class="rtab active" data-range="1" onclick="setRange(this)">Today</button>
      <button class="rtab" data-range="7" onclick="setRange(this)">7D</button>
      <button class="rtab" data-range="30" onclick="setRange(this)">30D</button>
      <button class="rtab" data-range="0" onclick="setRange(this)">All Time</button>
    </div>
    <button id="refresh-btn" onclick="refreshData()" style="font-size:11px;font-weight:600;padding:6px 14px;border-radius:6px;border:1px solid var(--border2);color:var(--muted2);background:var(--card);cursor:pointer;letter-spacing:.3px;transition:all .15s;display:flex;align-items:center;gap:5px" onmouseover="this.style.color='var(--text)'" onmouseout="this.style.color='var(--muted2)'">
      <span id="refresh-icon">↻</span> Refresh
    </button>
  </div>
</div>

<!-- MAIN -->
<div class="main" id="main-content">
  <div class="loading" id="loader"><div class="spinner"></div> Loading trade history from Polymarket API…</div>
</div>

<script>
// ── State ────────────────────────────────────────────────────────────────────
let allTrades = [], dailyPnlData = {}, balanceHistoryData = [], byAssetData = {}, byPriceBucketData = {}, byPathData = {};
let currentRange = 1;  // default: Today
let sortCol = 'entryTs', sortDir = -1;
let tableFilters = { asset: '', result: '', type: '' };

// Chart instances (for destroy/recreate on range change)
let charts = {};

// ── Boot ─────────────────────────────────────────────────────────────────────
async function loadData() {
  const mc = document.getElementById('main-content');
  mc.innerHTML = '<div class="loading" id="loader"><div class="spinner"></div> Loading trade history from Polymarket API…</div>';
  try {
    const r = await fetch('/api/report-data');
    const d = await r.json();
    if (d.error) throw new Error(d.error);
    allTrades          = d.trades          || [];
    dailyPnlData       = d.dailyPnl        || {};
    balanceHistoryData = d.balanceHistory  || [];
    byAssetData        = d.byAsset         || {};
    byPriceBucketData  = d.byPriceBucket   || {};
    byPathData         = d.byPath          || {};

    // Wallet from state
    const sr = await fetch('/api/state');
    const s  = await sr.json();
    const w  = s.wallet || '';
    document.getElementById('hdr-wallet').textContent = w ? w.slice(0,6)+'…'+w.slice(-4) : '—';
    document.getElementById('hdr-updated').textContent = 'Updated ' + new Date().toLocaleTimeString();

    render();
  } catch (e) {
    mc.innerHTML = `<div class="error-msg">❌ Failed to load: ${e.message}</div>`;
  }
}

// ── Date range filter ────────────────────────────────────────────────────────
function setRange(btn) {
  document.querySelectorAll('.rtab').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  currentRange = parseInt(btn.dataset.range);
  render();
}

function filterTrades() {
  if (!currentRange) return allTrades;
  const cutoff = Date.now() - currentRange * 86400000;
  return allTrades.filter(t => t.entryTs >= cutoff);
}

function localDate(ts) {
  // Returns YYYY-MM-DD in browser local timezone
  return new Date(ts).toLocaleDateString('en-CA');  // en-CA gives ISO-style YYYY-MM-DD
}

function filterDailyPnl() {
  // Compute from trades using local timezone so dates match the trades table
  const trades = filterTrades().filter(t => t.isOracleLag && t.result !== 'OPEN');
  if (!trades.length) return {};
  const raw = {};
  for (const t of trades) {
    const d = localDate(t.entryTs);
    raw[d] = Math.round(((raw[d]||0) + t.pnl) * 100) / 100;
  }
  // Fill every day from first trade to today with 0 so no gaps
  const today = localDate(Date.now());
  const first = Object.keys(raw).sort()[0];
  const result = {};
  for (let dt = new Date(first+'T00:00:00'); localDate(dt) <= today; dt.setDate(dt.getDate()+1)) {
    const key = localDate(dt);
    result[key] = raw[key] ?? 0;
  }
  return result;
}

function filterBalanceHistory() {
  if (!currentRange) return balanceHistoryData;
  const cutoff = Date.now() - currentRange * 86400000;
  return balanceHistoryData.filter(p => p.ts >= cutoff);
}

// ── Compute metrics ──────────────────────────────────────────────────────────
function computeMetrics(trades) {
  const done  = trades.filter(t => t.result !== 'OPEN' && t.isOracleLag);
  const wins  = done.filter(t => t.result === 'WIN');
  const loses = done.filter(t => t.result === 'LOSS');

  const grossWin  = wins.reduce((s,t)  => s + t.pnl, 0);
  const grossLoss = Math.abs(loses.reduce((s,t) => s + t.pnl, 0));
  const netPnl    = grossWin - grossLoss;
  const totalCost = done.reduce((s,t) => s + t.cost, 0);
  const roi       = totalCost > 0 ? (netPnl / totalCost * 100) : 0;
  const winRate   = done.length ? (wins.length / done.length * 100) : 0;

  const avgWin  = wins.length  ? grossWin  / wins.length  : 0;
  const avgLoss = loses.length ? grossLoss / loses.length : 0;
  const pf      = grossLoss > 0 ? grossWin / grossLoss : grossWin > 0 ? Infinity : 0;

  // Avg hold time
  const withHold = done.filter(t => t.holdSecs !== null);
  const avgHold  = withHold.length ? withHold.reduce((s,t) => s + t.holdSecs, 0) / withHold.length : 0;

  // Max drawdown from cumulative PNL series (use local entry date to match daily PNL chart)
  const byDate = {};
  for (const t of done) {
    const d = localDate(t.entryTs);
    byDate[d] = (byDate[d]||0) + t.pnl;
  }
  const dates = Object.keys(byDate).sort();
  let cum = 0, peak = 0, maxDD = 0;
  for (const d of dates) {
    cum += byDate[d];
    if (cum > peak) peak = cum;
    const dd = peak - cum;
    if (dd > maxDD) maxDD = dd;
  }

  return { netPnl, roi, totalCost, grossWin, grossLoss, winRate, wins: wins.length, loses: loses.length,
           total: done.length, open: trades.filter(t=>t.result==='OPEN').length,
           avgWin, avgLoss, pf, avgHold, maxDD };
}

// ── Format helpers ───────────────────────────────────────────────────────────
function fmt$(v) {
  if (!isFinite(v)) return '+∞';
  const s = Math.abs(v).toFixed(2);
  return (v >= 0 ? '+$' : '-$') + s;
}
function fmtHold(s) {
  if (!s || s < 0) return '—';
  if (s < 60)   return s.toFixed(0) + 's';
  if (s < 3600) return Math.round(s/60) + 'm ' + (s%60).toFixed(0) + 's';
  return Math.floor(s/3600) + 'h ' + Math.round((s%3600)/60) + 'm';
}
function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

// ── Render ────────────────────────────────────────────────────────────────────
function render() {
  // Destroy old charts
  Object.values(charts).forEach(c => { try { c.destroy(); } catch {} });
  charts = {};

  const trades = filterTrades();
  const m      = computeMetrics(trades);
  const dpnl   = filterDailyPnl();
  const balHist = filterBalanceHistory();

  // Subtitle
  const from = trades.length ? new Date(Math.min(...trades.map(t=>t.entryTs))).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'}) : '—';
  const to   = trades.length ? new Date(Math.max(...trades.map(t=>t.entryTs))).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'}) : '—';
  document.getElementById('page-subtitle').textContent = `${from} → ${to} · ${trades.length} trades fetched from Polymarket API`;

  // ── KPI CARDS ─────────────────────────────────────────────────────────────
  const pnlColor = m.netPnl >= 0 ? 'pos' : 'neg';
  const pfFmt    = isFinite(m.pf) ? m.pf.toFixed(2) : '∞';
  const pfColor  = m.pf >= 1 ? 'pos' : 'neg';

  document.getElementById('main-content').innerHTML = `
  <!-- ROW 1 -->
  <div class="kpi-row">
    <div class="kcard g">
      <div class="klbl">Net P&amp;L</div>
      <div class="kval ${pnlColor}">${fmt$(m.netPnl)}</div>
      <div class="ksub ${pnlColor}">${m.roi >= 0?'+':''}${m.roi.toFixed(1)}% ROI on $${m.totalCost.toFixed(2)} staked</div>
    </div>
    <div class="kcard b">
      <div class="klbl">Win Rate</div>
      <div class="kval ${m.winRate>=50?'pos':'neg'}">${m.winRate.toFixed(1)}%</div>
      <div class="ksub">${m.wins}W / ${m.loses}L · ${m.open} open</div>
    </div>
    <div class="kcard p">
      <div class="klbl">Trades Fired</div>
      <div class="kval neu">${m.total}</div>
      <div class="ksub">Oracle lag oracle signals</div>
    </div>
    <div class="kcard y">
      <div class="klbl">Avg Hold Time</div>
      <div class="kval dim">${fmtHold(m.avgHold)}</div>
      <div class="ksub">Entry → market settlement</div>
    </div>
  </div>

  <!-- ROW 2 -->
  <div class="kpi-row">
    <div class="kcard g">
      <div class="klbl">Avg Profit / Win</div>
      <div class="kval pos">${m.avgWin > 0 ? '+$'+m.avgWin.toFixed(2) : '$—'}</div>
      <div class="ksub">Gross $${m.grossWin.toFixed(2)} across ${m.wins} wins</div>
    </div>
    <div class="kcard r">
      <div class="klbl">Avg Loss / Loss</div>
      <div class="kval neg">${m.avgLoss > 0 ? '-$'+m.avgLoss.toFixed(2) : '$—'}</div>
      <div class="ksub">Gross -$${m.grossLoss.toFixed(2)} across ${m.loses} losses</div>
    </div>
    <div class="kcard c">
      <div class="klbl">Profit Factor</div>
      <div class="kval ${pfColor}">${pfFmt}</div>
      <div class="ksub">Gross win / gross loss · ${m.pf>=1?'Edge intact':'Edge negative'}</div>
    </div>
    <div class="kcard o">
      <div class="klbl">Max Drawdown</div>
      <div class="kval neg">-$${m.maxDD.toFixed(2)}</div>
      <div class="ksub">Largest peak-to-trough run</div>
    </div>
  </div>

  <!-- DAILY P&L BAR CHART -->
  <div class="cpanel">
    <div class="cpanel-hdr">
      <span class="cpanel-title">📅 Daily P&amp;L</span>
      <span style="font-size:11px;color:var(--muted2)">Net realised PNL per day</span>
    </div>
    <canvas id="cDailyPnl" height="90"></canvas>
  </div>

  <!-- BALANCE HISTORY LINE CHART (zoomable) -->
  <div class="cpanel">
    <div class="cpanel-hdr">
      <div style="display:flex;align-items:center;gap:8px">
        <span class="cpanel-title">📈 Wallet Balance (USDC)</span>
        <span class="zoom-hint">Scroll to zoom · Drag to pan · Double-click to reset</span>
      </div>
      <div class="cpanel-actions">
        <button class="chart-btn" onclick="resetZoom()">Reset Zoom</button>
      </div>
    </div>
    <canvas id="cBalance" height="90"></canvas>
  </div>

  <!-- TWO COLUMNS: Donut + Horizontal Bar -->
  <div class="two-col">
    <div class="cpanel">
      <div class="cpanel-hdr"><span class="cpanel-title">🎯 Results Breakdown</span></div>
      <canvas id="cDonut" height="200"></canvas>
    </div>
    <div class="cpanel">
      <div class="cpanel-hdr"><span class="cpanel-title">⚡ P&amp;L by Asset</span></div>
      <canvas id="cAsset" height="200"></canvas>
    </div>
  </div>

  <!-- PRICE BUCKET WIN RATE + PATH BREAKDOWN -->
  <div class="two-col">
    <div class="cpanel">
      <div class="cpanel-hdr"><span class="cpanel-title">📊 Win Rate by Entry Price</span><span style="font-size:10px;color:var(--muted2)">CLOB ask at bet time</span></div>
      <table style="width:100%;border-collapse:collapse;font-size:12px" id="bucket-table">
        <thead><tr style="border-bottom:1px solid var(--border)">
          <th style="text-align:left;padding:6px 4px;color:var(--muted);font-weight:500;letter-spacing:.5px;font-size:10px;text-transform:uppercase">Price Range</th>
          <th style="text-align:center;padding:6px 4px;color:var(--muted);font-weight:500;font-size:10px;text-transform:uppercase">W/L</th>
          <th style="text-align:center;padding:6px 4px;color:var(--muted);font-weight:500;font-size:10px;text-transform:uppercase">Win%</th>
          <th style="text-align:right;padding:6px 4px;color:var(--muted);font-weight:500;font-size:10px;text-transform:uppercase">Net P&L</th>
          <th style="text-align:right;padding:6px 4px;color:var(--muted);font-weight:500;font-size:10px;text-transform:uppercase">ROI</th>
        </tr></thead>
        <tbody id="bucket-tbody"></tbody>
      </table>
    </div>
    <div class="cpanel">
      <div class="cpanel-hdr"><span class="cpanel-title">🛤 Path Performance</span><span style="font-size:10px;color:var(--muted2)">From bet_log.json</span></div>
      <table style="width:100%;border-collapse:collapse;font-size:12px" id="path-table">
        <thead><tr style="border-bottom:1px solid var(--border)">
          <th style="text-align:left;padding:6px 4px;color:var(--muted);font-weight:500;letter-spacing:.5px;font-size:10px;text-transform:uppercase">Path</th>
          <th style="text-align:center;padding:6px 4px;color:var(--muted);font-weight:500;font-size:10px;text-transform:uppercase">Trades</th>
          <th style="text-align:right;padding:6px 4px;color:var(--muted);font-weight:500;font-size:10px;text-transform:uppercase">Staked</th>
        </tr></thead>
        <tbody id="path-tbody"></tbody>
      </table>
    </div>
  </div>

  <!-- TRADES TABLE -->
  <div class="tpanel">
    <div class="tpanel-hdr">
      <span class="tpanel-title">📋 All Trades <span id="trade-count" style="color:var(--muted);font-weight:400"></span></span>
      <span style="font-size:10px;color:var(--muted)">Click column headers to sort</span>
    </div>
    <div class="filter-bar">
      <div class="filter-group">
        <span class="filter-label">Asset</span>
        ${['','BTC','SOL','ETH','XRP','DOGE','BNB','OTHER'].map(a=>`<button class="fchip${tableFilters.asset===a?' active':''}" onclick="setFilter('asset','${a}',this)">${a||'All'}</button>`).join('')}
      </div>
      <div class="filter-sep"></div>
      <div class="filter-group">
        <span class="filter-label">Result</span>
        <button class="fchip${tableFilters.result===''?' active':''}" onclick="setFilter('result','',this)">All</button>
        <button class="fchip win${tableFilters.result==='WIN'?' active':''}" onclick="setFilter('result','WIN',this)">WIN</button>
        <button class="fchip loss${tableFilters.result==='LOSS'?' active':''}" onclick="setFilter('result','LOSS',this)">LOSS</button>
        <button class="fchip open${tableFilters.result==='OPEN'?' active':''}" onclick="setFilter('result','OPEN',this)">OPEN</button>
      </div>
      <div class="filter-sep"></div>
      <div class="filter-group">
        <span class="filter-label">Type</span>
        <button class="fchip${tableFilters.type===''?' active':''}" onclick="setFilter('type','',this)">All</button>
        <button class="fchip${tableFilters.type==='lag'?' active':''}" onclick="setFilter('type','lag',this)">Oracle Lag</button>
        <button class="fchip${tableFilters.type==='manual'?' active':''}" onclick="setFilter('type','manual',this)">Manual</button>
      </div>
    </div>
    <div class="scroll-box" style="max-height:440px">
      <table id="trade-table">
        <thead>
          <tr>
            <th onclick="sortBy('entryTs')"   data-col="entryTs">   Time       <span class="arrow">↕</span></th>
            <th onclick="sortBy('title')"     data-col="title">     Market     <span class="arrow">↕</span></th>
            <th onclick="sortBy('asset')"     data-col="asset">     Asset      <span class="arrow">↕</span></th>
            <th onclick="sortBy('side')"      data-col="side">      Side       <span class="arrow">↕</span></th>
            <th onclick="sortBy('entryPrice')"data-col="entryPrice">Entry      <span class="arrow">↕</span></th>
            <th onclick="sortBy('cost')"      data-col="cost">      Staked     <span class="arrow">↕</span></th>
            <th onclick="sortBy('holdSecs')"  data-col="holdSecs">  Hold Time  <span class="arrow">↕</span></th>
            <th onclick="sortBy('pnl')"       data-col="pnl">       P&amp;L   <span class="arrow">↕</span></th>
            <th onclick="sortBy('result')"    data-col="result">    Result     <span class="arrow">↕</span></th>
          </tr>
        </thead>
        <tbody id="trade-tbody"></tbody>
      </table>
    </div>
  </div>
  `;

  // ── Draw charts ───────────────────────────────────────────────────────────
  const G = '#1fd475', R = '#ff3f5e', B = '#3f80ff';
  const gridColor = 'rgba(26,34,54,.8)';

  // Shared Chart.js defaults for dark theme
  Chart.defaults.color       = '#4e5f7e';
  Chart.defaults.borderColor = gridColor;
  Chart.defaults.font.family = 'Inter, sans-serif';
  Chart.defaults.font.size   = 11;

  // 1. Daily P&L bar chart
  const dpDates = Object.keys(dpnl).sort();
  const dpVals  = dpDates.map(d => Math.round(dpnl[d]*100)/100);
  charts.daily = new Chart(document.getElementById('cDailyPnl'), {
    type: 'bar',
    data: {
      labels: dpDates.map(d => new Date(d+'T00:00:00').toLocaleDateString('en-US',{month:'short',day:'numeric'})),
      datasets: [{
        data: dpVals,
        backgroundColor: dpVals.map(v => v >= 0 ? G+'aa' : R+'aa'),
        borderColor:      dpVals.map(v => v >= 0 ? G : R),
        borderWidth: 1,
        borderRadius: 4,
      }]
    },
    options: {
      responsive: true,
      plugins: { legend: { display: false },
        tooltip: { callbacks: { label: ctx => ` ${ctx.raw >= 0?'+':''}$${Math.abs(ctx.raw).toFixed(2)}` } }
      },
      scales: {
        x: { grid: { color: gridColor }, ticks: { color: '#4e5f7e' } },
        y: { grid: { color: gridColor }, ticks: { color: '#4e5f7e', callback: v => (v>=0?'+':'')+v.toFixed(0) } }
      }
    }
  });

  // 2. Wallet balance history — actual USDC balance at each transaction moment, zoomable
  const balPts    = balHist;  // [{ts, balance}]
  const balLabels = balPts.map(p => {
    const d = new Date(p.ts);
    return d.toLocaleDateString('en-US',{month:'short',day:'numeric'}) + ' ' +
           d.toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit',hour12:false});
  });
  const balVals = balPts.map(p => p.balance);
  charts.balance = new Chart(document.getElementById('cBalance'), {
    type: 'line',
    data: {
      labels: balLabels,
      datasets: [{
        data: balVals,
        borderColor: B,
        backgroundColor: B + '18',
        fill: true,
        tension: 0.2,
        pointRadius: balPts.length > 100 ? 0 : 3,
        pointHoverRadius: 5,
        pointBackgroundColor: B,
        pointBorderColor: B,
      }]
    },
    options: {
      responsive: true,
      plugins: {
        legend: { display: false },
        tooltip: {
          callbacks: {
            title: items => balLabels[items[0].dataIndex],
            label: ctx => ` Balance: $${ctx.raw.toFixed(2)} USDC`
          }
        },
        zoom: {
          pan: { enabled: true, mode: 'x' },
          zoom: {
            wheel: { enabled: true },
            pinch: { enabled: true },
            mode: 'x',
          }
        }
      },
      scales: {
        x: { grid: { color: gridColor }, ticks: { color: '#4e5f7e', maxTicksLimit: 12,
               autoSkip: true, maxRotation: 0 } },
        y: {
          grid: { color: gridColor },
          ticks: { color: '#4e5f7e', callback: v => '$'+v.toFixed(0) }
        }
      }
    }
  });

  // 3. Results donut
  const oracleFiltered = trades.filter(t => t.isOracleLag);
  const wCount = oracleFiltered.filter(t=>t.result==='WIN').length;
  const lCount = oracleFiltered.filter(t=>t.result==='LOSS').length;
  const oCount = oracleFiltered.filter(t=>t.result==='OPEN').length;
  charts.donut = new Chart(document.getElementById('cDonut'), {
    type: 'doughnut',
    data: {
      labels: ['WIN', 'LOSS', 'OPEN'],
      datasets: [{
        data: [wCount, lCount, oCount],
        backgroundColor: [G+'bb', R+'bb', '#f5c030bb'],
        borderColor: [G, R, '#f5c030'],
        borderWidth: 1,
      }]
    },
    options: {
      cutout: '58%',
      plugins: {
        legend: { position: 'bottom', labels: { color: '#8090b0', boxWidth: 10, padding: 12 } },
        tooltip: { callbacks: {
          label: ctx => ` ${ctx.label}: ${ctx.raw} trade${ctx.raw!==1?'s':''}`
        }}
      }
    }
  });

  // 4. P&L by asset horizontal bar
  const assets = ['BTC','ETH','SOL','XRP','DOGE','BNB','OTHER'].filter(a => byAssetData[a]);
  const assetPnls = assets.map(a => (byAssetData[a]?.pnl||0));
  charts.asset = new Chart(document.getElementById('cAsset'), {
    type: 'bar',
    data: {
      labels: assets,
      datasets: [{
        data: assetPnls,
        backgroundColor: assetPnls.map(v => v >= 0 ? G+'aa' : R+'aa'),
        borderColor:      assetPnls.map(v => v >= 0 ? G : R),
        borderWidth: 1,
        borderRadius: 4,
      }]
    },
    options: {
      indexAxis: 'y',
      responsive: true,
      plugins: { legend: { display: false },
        tooltip: { callbacks: { label: ctx => ` ${ctx.raw>=0?'+':''}$${Math.abs(ctx.raw).toFixed(2)}` }}
      },
      scales: {
        x: { grid: { color: gridColor }, ticks: { color: '#4e5f7e', callback: v => '$'+v.toFixed(0) } },
        y: { grid: { display: false }, ticks: { color: '#8090b0' } }
      }
    }
  });

  // ── Price bucket win rate table ───────────────────────────────────────────
  const bucketOrder = ['<0.20','0.20-0.30','0.30-0.38','≥0.38'];
  const bucketTbody = document.getElementById('bucket-tbody');
  if (bucketTbody) {
    const rows = bucketOrder.filter(b => byPriceBucketData[b]).map(b => {
      const bk = byPriceBucketData[b];
      const total = bk.wins + bk.losses;
      const wr = total > 0 ? (bk.wins / total * 100).toFixed(0) : '—';
      const wrNum = total > 0 ? bk.wins / total * 100 : -1;
      const roi = bk.cost > 0 ? (bk.pnl / bk.cost * 100).toFixed(1) : '—';
      const pnlCls = bk.pnl >= 0 ? 'pos' : 'neg';
      const wrCls  = wrNum >= 50 ? 'pos' : wrNum >= 0 ? 'neg' : '';
      return `<tr style="border-bottom:1px solid var(--border)">
        <td style="padding:7px 4px;font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--text)">${b}</td>
        <td style="text-align:center;padding:7px 4px"><span class="pos">${bk.wins}W</span> / <span class="neg">${bk.losses}L</span></td>
        <td style="text-align:center;padding:7px 4px"><span class="${wrCls}" style="font-weight:700">${wr}%</span></td>
        <td style="text-align:right;padding:7px 4px;font-family:'JetBrains Mono',monospace"><span class="${pnlCls}">${bk.pnl>=0?'+':''}$${bk.pnl.toFixed(2)}</span></td>
        <td style="text-align:right;padding:7px 4px;font-family:'JetBrains Mono',monospace"><span class="${bk.pnl>=0?'pos':'neg'}">${roi !== '—' ? (bk.pnl>=0?'+':'')+roi+'%' : '—'}</span></td>
      </tr>`;
    });
    bucketTbody.innerHTML = rows.length ? rows.join('') : '<tr><td colspan="5" style="padding:12px;color:var(--muted);text-align:center">No settled oracle lag trades</td></tr>';
  }

  // ── Path breakdown table (from bet_log) ──────────────────────────────────
  const pathTbody = document.getElementById('path-tbody');
  if (pathTbody) {
    const pathRows = Object.entries(byPathData).sort((a,b) => b[1].trades - a[1].trades).map(([path, pd]) => {
      return `<tr style="border-bottom:1px solid var(--border)">
        <td style="padding:7px 4px;font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--yellow)">${path}</td>
        <td style="text-align:center;padding:7px 4px">${pd.trades}</td>
        <td style="text-align:right;padding:7px 4px;font-family:'JetBrains Mono',monospace;color:var(--muted2)">$${pd.cost.toFixed(2)}</td>
      </tr>`;
    });
    pathTbody.innerHTML = pathRows.length ? pathRows.join('') : '<tr><td colspan="3" style="padding:12px;color:var(--muted);text-align:center">No bet_log data yet</td></tr>';
  }

  // ── Trade table ───────────────────────────────────────────────────────────
  renderTable(applyTableFilters(trades));
}

// ── Trade table ───────────────────────────────────────────────────────────────
function renderTable(trades) {
  const sorted = [...trades].sort((a, b) => {
    let av = a[sortCol], bv = b[sortCol];
    if (av == null) av = sortDir < 0 ? -Infinity : Infinity;
    if (bv == null) bv = sortDir < 0 ? -Infinity : Infinity;
    if (typeof av === 'string') return sortDir * av.localeCompare(bv);
    return sortDir * (av - bv);
  });

  // Update sort indicators
  document.querySelectorAll('th[data-col]').forEach(th => {
    th.classList.toggle('sorted', th.dataset.col === sortCol);
    const arr = th.querySelector('.arrow');
    if (arr) arr.textContent = th.dataset.col === sortCol ? (sortDir < 0 ? '↓' : '↑') : '↕';
  });

  document.getElementById('trade-count').textContent = `(${sorted.length})`;

  const tbody = document.getElementById('trade-tbody');
  if (!sorted.length) {
    tbody.innerHTML = '<tr class="erow"><td colspan="9">No trades in this period</td></tr>';
    return;
  }

  tbody.innerHTML = sorted.map(t => {
    const entryD = new Date(t.entryTs);
    const dateStr = entryD.toLocaleDateString('en-US',{month:'short',day:'numeric',year:'2-digit'});
    const timeStr = entryD.toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit'});
    const pnlStr = t.pnl >= 0 ? `<span class="pos">+$${t.pnl.toFixed(2)}</span>` : `<span class="neg">-$${Math.abs(t.pnl).toFixed(2)}</span>`;
    const badgeCls = t.result === 'WIN' ? 'badge-win' : t.result === 'LOSS' ? 'badge-loss' : 'badge-open';
    const sideCls  = (t.side||'').toLowerCase().includes('up')||(t.side||'').toLowerCase().includes('yes') ? 'b-up' : 'b-dn';
    const mktShort = esc((t.title||'').replace('Up or Down - ','').replace(' ET',''));
    const isLag    = t.isOracleLag ? '' : '<span style="font-size:9px;color:var(--orange);margin-left:4px">Manual</span>';
    return `<tr>
      <td class="mono" style="color:var(--muted2);font-size:11px">${dateStr}<br>${timeStr}</td>
      <td style="max-width:220px;overflow:hidden;text-overflow:ellipsis">${mktShort}${isLag}</td>
      <td><strong>${esc(t.asset)}</strong></td>
      <td><span class="${sideCls}">${esc(t.side||'?')}</span></td>
      <td class="mono">${t.entryPrice ? (t.entryPrice*100).toFixed(1)+'¢' : '—'}</td>
      <td class="mono">$${t.cost.toFixed(2)}</td>
      <td class="mono" style="color:var(--muted2)">${fmtHold(t.holdSecs)}</td>
      <td class="mono">${pnlStr}</td>
      <td><span class="badge ${badgeCls}">${t.result}</span></td>
    </tr>`;
  }).join('');
}

// ── Table filters ─────────────────────────────────────────────────────────────
function applyTableFilters(trades) {
  return trades.filter(t => {
    if (tableFilters.asset  && t.asset  !== tableFilters.asset)  return false;
    if (tableFilters.result && t.result !== tableFilters.result) return false;
    if (tableFilters.type === 'lag'    && !t.isOracleLag) return false;
    if (tableFilters.type === 'manual' &&  t.isOracleLag) return false;
    return true;
  });
}

function setFilter(key, val, btn) {
  tableFilters[key] = val;
  // Update active chip in this group only
  btn.closest('.filter-group').querySelectorAll('.fchip').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderTable(applyTableFilters(filterTrades()));
}

function sortBy(col) {
  if (sortCol === col) sortDir *= -1;
  else { sortCol = col; sortDir = -1; }
  renderTable(applyTableFilters(filterTrades()));
}

function resetZoom() {
  if (charts.balance) charts.balance.resetZoom();
}

async function refreshData() {
  const btn  = document.getElementById('refresh-btn');
  const icon = document.getElementById('refresh-icon');
  btn.disabled = true;
  icon.style.animation = 'spin .7s linear infinite';
  icon.style.display = 'inline-block';
  try {
    await loadData();
  } finally {
    btn.disabled = false;
    icon.style.animation = '';
  }
}

// ── Start ─────────────────────────────────────────────────────────────────────
loadData();
</script>
</body>
</html>
